namespace = EFMIv1

; Includes -------------------------

[IncludeTextPrinter]
include = TextPrinter.ini

[IncludeShapeKeysEngine]
include = ShapeKeys.ini

[Include API]
include = API.ini

[Include KeyBindings]
include = KeyBindings.ini

[Include Libraries]
include = Libraries\Includes.ini

; Resources -------------------------

[ResourceModName]
[ResourceModAuthor]
[ResourceModDesc]
[ResourceModLink]
[ResourceModLogo]

[ResourceDebugRW]
type = RWBuffer
format = R32G32B32A32_FLOAT
array = 128

[ResourceVersionNotification]
type = Buffer
data = "EFMI 1.3.0 (PRESS F12 TO SHOW GUIDE)"


; Constants -------------------------

[Constants]
global $version = 1.30

global $enable_mods = 1

global persist $first_run = 1
global persist $last_update_notification = 0

global $show_user_guide = 0
global $show_hunting_mode_guide = 0
global $show_update_notification = 0
global $mods_display_switch_time = 0

global $object_guid = 0
global $mod_id = 0
global $required_version = 0


; Present -------------------------

[Present]
; pre Resource\Debugger\DebugRW = copy ResourceDebugRW
run = CommandListRenderGUI


; Shader overrides -----------------------------------------

; This is very inefficient hence is limited to the most common resources
[ShaderRegexEnableTextureOverrides]
shader_model = vs_4_0 vs_4_1 vs_5_0 vs_5_1
if $enable_mods
    if DRAW_TYPE % 2 == 0
        CheckTextureOverride = ib
    endif
endif


; Core Logic -------------------------

[CommandListToggleMods]
$enable_mods = !$enable_mods
$mods_display_switch_time = time


; Registers mod in EFMI and returns $mod_id
; If returned $mod_id == -1, mod must disable all its functions for user safety
[CommandListRegisterMod]
$mod_id = 1
; Ensure that user had required version of EFMI
if $version < $required_version
    ResourceErrorIncompatibleVersionRef = ref ResourceErrorOldVersionEFMI
    $mod_id = -1
endif
; Ensure that mod uses supported version of installed EFMI API
if $required_version < 0.0
    ResourceErrorIncompatibleVersionRef = ref ResourceErrorOldVersionMod
    $mod_id = -1
endif
; Set mod name for error display if there is version incompatibility
if $mod_id == -1
    if ResourceModName === null
        ResourceModName = ResourceUnnamedModName
    endif
    ResourceErrorIncompatibleVersionModNameRef = copy ResourceModName
endif


; GUI -------------------------

[CommandListRenderGUI]
if time < 60
    ResourceText = ref ResourceVersionNotification
    ResourceTextParams = ref ResourceVersionNotificationParams
    run = CommandListPrintText
    if $first_run
        $show_user_guide = 1
    endif
    if $last_update_notification < 1.22
        $show_update_notification = 1
    endif
endif

if $show_user_guide
    ResourceText = ref ResourceUserGuide
    ResourceTextParams = ref ResourceUserGuideParams
    run = CommandListPrintText
elif $show_update_notification
    ResourceText = ref ResourceVersionUpdateEFMI
    ResourceTextParams = ref ResourceUserGuideParams
    run = CommandListPrintText
elif $show_hunting_mode_guide
    ResourceText = ref ResourceHuntingModeGuide
    ResourceTextParams = ref ResourceUserGuideParams
    run = CommandListPrintText
endif

if $mods_display_switch_time != 0
    if $enable_mods
        ResourceText = ref ResourceModsDisplayEnabled
    else
        ResourceText = ref ResourceModsDisplayDisabled
    endif
    ResourceTextParams = ResourceTopNotificationParams
    run = CommandListPrintText
    if time - $mods_display_switch_time > 1.5
        $mods_display_switch_time = 0
    endif
endif

if ResourceErrorIncompatibleVersionModNameRef !== null
    ResourceText = ref ResourceErrorIncompatibleVersionRef
    ResourceTextParams = ref ResourceErrorIncompatibleVersionNotificationParams
    run = CommandListPrintText

    ResourceText = ref ResourceErrorIncompatibleVersionModNameRef
    ResourceTextParams = ref ResourceErrorIncompatibleVersionModNameParams
    run = CommandListPrintText
endif

[CommandListHideMajorNotification]
if $first_run
    $first_run = 0
elif $show_update_notification
    $show_update_notification = 0
    $last_update_notification = $version
endif

[CommandListHideNotification]
ResourceErrorIncompatibleVersionModNameRef = null

; GUI Resources -------------------------

[ResourceUserGuide]
type = buffer
format = R8_UINT
filename = Notifications/UserGuide.md

[ResourceHuntingModeGuide]
type = buffer
format = R8_UINT
filename = Notifications/HuntingModeGuide.md

[ResourceErrorOldVersionMod]
type = buffer
format = R8_UINT
filename = Notifications/ErrorOldVersionMod.md

[ResourceErrorOldVersionEFMI]
type = buffer
format = R8_UINT
filename = Notifications/ErrorOldVersionEFMI.md

[ResourceVersionUpdateEFMI]
type = buffer
format = R8_UINT
filename = Notifications/VersionUpdateEFMI.md

[ResourceErrorIncompatibleVersionRef]

[ResourceErrorIncompatibleVersionModNameRef]

[ResourceUnnamedModName]
type = Buffer
data = "< Unnamed Mod >"

[ResourceModsDisplayEnabled]
type = Buffer
data = "Mods Display: Enabled"

[ResourceModsDisplayDisabled]
type = Buffer
data = "Mods Display: Disabled"

